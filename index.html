<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Windows 98 Test</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}
#screen_container {
  width:100%;
  height:90vh;
  background:black;
}
button {
  margin:20px;
  padding:12px 20px;
  font-size:16px;
}
</style>
</head>
<body>

<button onclick="startVM()">Start Windows 98</button>
<div id="screen_container"></div>

<script src="https://copy.sh/v86/build/libv86.js"></script>

<script>
function startVM() {

  const emulator = new V86Starter({
    wasm_path: "https://copy.sh/v86/build/v86.wasm",

    memory_size: 256 * 1024 * 1024,
    vga_memory_size: 8 * 1024 * 1024,

    screen_container: document.getElementById("screen_container"),

    bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
    vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },

    hda: {
      url: "https://copy.sh/v86/images/windows98.img"
    },

    autostart: true
  });

}
</script>

</body>
</html>
