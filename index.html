<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YaVM</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Tahoma,Arial;
overflow:hidden;
}

/* BOOT */

#bootScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:black;
z-index:1000;
}

#bootLogo{
width:420px;
margin-bottom:30px;
}

#loadingBox{
width:250px;
height:18px;
border:2px solid #888;
overflow:hidden;
}

#bar{
height:100%;
width:40%;
background:linear-gradient(#8fb2ff,#2147d9);
animation:move 1.2s linear infinite;
}

@keyframes move{
0%{transform:translateX(-120%)}
100%{transform:translateX(240%)}
}

#skipBootBtn{
position:absolute;
top:20px;
right:20px;
background:#111;
border:1px solid #555;
color:white;
padding:10px;
cursor:pointer;
}

/* POST */

#postScreen{
display:none;
position:fixed;
inset:0;
background:black;
color:#ddd;
font-family:"Courier New";
padding:30px;
}

/* BIOS */

#biosScreen{
display:none;
position:fixed;
inset:0;
background:#0a0a0a;
padding:40px;
}

.choice-btn{
display:block;
margin:10px 0;
padding:12px;
background:#111;
border:1px solid #555;
color:white;
cursor:pointer;
}

/* VM */

#vmScreen{
display:none;
position:fixed;
inset:0;
background:black;
}

#screen_container{
width:100%;
height:100%;
}

</style>
</head>

<body>

<div id="bootScreen">

<button id="skipBootBtn" onclick="skipBootAnimation()">Skip Animation</button>

<img id="bootLogo" src="xpboot.png">

<div id="loadingBox">
<div id="bar"></div>
</div>

<div style="position:absolute;bottom:20px;left:20px">
Copyright © YaqubPapp™
</div>

<div style="position:absolute;bottom:20px;right:20px">
YaqubPapp™
</div>

</div>


<div id="postScreen">
<pre id="postText"></pre>
</div>


<div id="biosScreen">

<h2>YaVM BIOS Setup Utility</h2>

<button class="choice-btn" onclick="bootVM()">Boot Windows 98</button>

</div>


<div id="vmScreen">
<div id="screen_container"></div>
</div>


<script src="https://copy.sh/v86/build/v86.js"></script>

<script>

let emulator
let detectedSpecs=null

/* DETECT HARDWARE */

function detectSpecs(){

const cores=navigator.hardwareConcurrency || "Unknown"
const ram=navigator.deviceMemory ? navigator.deviceMemory+" GB detected" : "Unavailable"
const platform=navigator.platform || "Unknown"

let gpu="Unavailable"

try{

const canvas=document.createElement("canvas")
const gl=canvas.getContext("webgl")

if(gl){

const ext=gl.getExtension("WEBGL_debug_renderer_info")

if(ext){
gpu=gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)
}

}

}catch(e){}

detectedSpecs={
cpu:typeof cores==="number"?cores+" logical cores detected":"Unknown",
ram:ram,
gpu:gpu,
platform:platform,
recommendedMB:256
}

}

/* BIOS TEXT */

function appendPostLine(line=""){
const text=document.getElementById("postText")
text.textContent+=line+"\n"
}

function clearPost(){
document.getElementById("postText").textContent=""
}

/* POST START */

function startPOST(){

document.getElementById("postScreen").style.display="block"

clearPost()

const introLines=[

"YaVM UNDI, PXE-2.1 (build 083)",
"Copyright YaVM by Yaqub Papp™ 1998-2026",
"",
"Checking Specs...",
""

]

let i=0

function typeIntro(){

if(i<introLines.length){

appendPostLine(introLines[i])

i++

setTimeout(typeIntro,120)

}else{

setTimeout(showSpecsPOST,500)

}

}

typeIntro()

}

/* SHOW SPECS */

function showSpecsPOST(){

const lines=[

"Found!",
"",
"CPU: "+detectedSpecs.cpu,
"System Memory: "+detectedSpecs.ram,
"GPU: "+detectedSpecs.gpu,
"Platform: "+detectedSpecs.platform,
"Recommended YaVM RAM: "+detectedSpecs.recommendedMB+" MB",
"",
"Reboot and Select proper Boot device",
"or Enter YaVM BIOS Setup"

]

let j=0

function typeSpecs(){

if(j<lines.length){

appendPostLine(lines[j])

j++

setTimeout(typeSpecs,120)

}else{

setTimeout(enteringBiosAnimation,600)

}

}

typeSpecs()

}

/* ENTER BIOS */

function enteringBiosAnimation(){

const states=["Entering BIOS.","Entering BIOS..","Entering BIOS..."]

let i=0

function next(){

if(i<states.length){

appendPostLine("")
appendPostLine(states[i])

i++

setTimeout(next,400)

}else{

setTimeout(showBIOS,500)

}

}

next()

}

function showBIOS(){

document.getElementById("postScreen").style.display="none"

document.getElementById("biosScreen").style.display="block"

}

/* SKIP */

function skipBootAnimation(){

document.getElementById("bootScreen").style.display="none"

startPOST()

}

/* VM */

function bootVM(){

document.getElementById("biosScreen").style.display="none"

document.getElementById("vmScreen").style.display="block"

startEmulator()

}

function startEmulator(){

emulator=new V86Starter({

wasm_path:"https://copy.sh/v86/build/v86.wasm",

memory_size:256*1024*1024,

vga_memory_size:8*1024*1024,

screen_container:document.getElementById("screen_container"),

bios:{url:"https://copy.sh/v86/bios/seabios.bin"},

vga_bios:{url:"https://copy.sh/v86/bios/vgabios.bin"},

cdrom:{url:"https://archive.org/download/windows-98-se-isofile/Windows%2098%20Second%20Edition.iso"},

autostart:true

})

}

/* START */

detectSpecs()

setTimeout(()=>{

document.getElementById("bootScreen").style.display="none"

startPOST()

},5000)

</script>

</body>
</html>
